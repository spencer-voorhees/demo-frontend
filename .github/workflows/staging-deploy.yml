name: Deploy to Staging on PR

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Simulate staging deploy
        run: sleep 5

      - name: Comment staging URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '✅ **Deployed to staging.** Ready for QA review.\n\nStaging URL: `https://staging.demo-client.example.com`'
            });

            // Also update the linked issue if found
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            const body = pr.data.body || '';
            const match = body.match(/[Cc]loses? #(\d+)/);
            if (match) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parseInt(match[1]),
                labels: ['needs-qa']
              });
            }
