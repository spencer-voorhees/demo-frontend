name: AI Bug Triage + Copilot Assignment

on:
  issues:
    types: [labeled]

jobs:
  ai-triage:
    if: github.event.label.name == 'bug'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      models: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: github/ai-assessment-comment-labeler@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue_number: ${{ github.event.issue.number }}
          issue_body: ${{ github.event.issue.body }}
          repo_name: ${{ github.event.repository.name }}
          owner: ${{ github.repository_owner }}
          ai_review_label: 'bug'
          prompts_directory: './Prompts'
          labels_to_prompts_mapping: 'bug,bug-triage.prompt.yml'

      - name: Assign Copilot coding agent
        uses: actions/github-script@v7
        with:
          script: |
            // REST API silently ignores Copilot bot; use GraphQL with feature flag instead
            await github.graphql(
              `mutation AssignCopilot($issueId: ID!, $copilotId: ID!) {
                addAssigneesToAssignable(input: {assignableId: $issueId, assigneeIds: [$copilotId]}) {
                  assignable {
                    ... on Issue { title }
                  }
                }
              }`,
              {
                issueId: context.payload.issue.node_id,
                copilotId: "BOT_kgDOC9w8XQ",
                headers: { "GraphQL-Features": "issues_copilot_assignment_api_support" }
              }
            );
            console.log("Copilot assigned via GraphQL");
